syntax = "proto2";

package com.writer.model.proto;

option java_multiple_files = true;

message StrokePointProto {
    optional float x = 1 [default = 0];
    optional float y = 2 [default = 0];
    optional float pressure = 3 [default = 1];
    optional int64 timestamp = 4 [default = 0];
}

enum StrokeTypeProto {
    FREEHAND = 0;
    LINE = 1;
    ARROW_HEAD = 2;
    ARROW_TAIL = 3;
    ARROW_BOTH = 4;
    ELBOW = 5;
    ELBOW_ARROW_HEAD = 6;
    ELBOW_ARROW_TAIL = 7;
    ELBOW_ARROW_BOTH = 8;
    ARC = 9;
    ARC_ARROW_HEAD = 10;
    ARC_ARROW_TAIL = 11;
    ARC_ARROW_BOTH = 12;
    ELLIPSE = 13;
    RECTANGLE = 14;
    ROUNDED_RECTANGLE = 15;
    TRIANGLE = 16;
    DIAMOND = 17;
}

// Compact per-channel delta-encoded numeric sequence.
// Decode: val[0] = offset + scale * deltas[0]
//         val[i] = val[i-1] + scale * deltas[i]
message NumericRunProto {
    repeated sint32 deltas = 1 [packed = true];
    optional float scale = 2 [default = 1];
    optional float offset = 3 [default = 0];
}

message InkStrokeProto {
    optional string stroke_id = 1 [default = ""];
    optional float stroke_width = 2 [default = 3];
    repeated StrokePointProto points = 3;
    optional StrokeTypeProto stroke_type = 4 [default = FREEHAND];
    optional bool is_geometric = 5 [default = false];

    // Compact column-oriented encoding (v3).
    // When x_run is present, decode from runs; 'points' field is empty.
    // All runs must have the same logical length (number of points).
    optional NumericRunProto x_run = 6;
    optional NumericRunProto y_run = 7;
    optional NumericRunProto pressure_run = 8;   // omitted if all pressures are 1.0
    optional NumericRunProto time_run = 9;       // omitted if timestamps not needed

    // Epoch ms of first point (v4). time_run holds ms deltas from this base.
    // Avoids float precision loss in NumericRunProto.offset for large timestamps.
    optional int64 stroke_timestamp = 10 [default = 0];
}

message DiagramAreaProto {
    optional string id = 1 [default = ""];
    optional int32 start_line_index = 2 [default = 0];
    optional int32 height_in_lines = 3 [default = 1];
}

message WordInfoProto {
    optional string text = 1 [default = ""];
    optional float confidence = 2 [default = 1.0];
    optional int64 start_ms = 3 [default = 0];
    optional int64 end_ms = 4 [default = 0];
}

message TextBlockProto {
    optional string id = 1 [default = ""];
    optional int32 start_line_index = 2 [default = 0];
    optional int32 height_in_lines = 3 [default = 1];
    optional string text = 4 [default = ""];
    optional string audio_file = 5 [default = ""];
    optional int64 audio_start_ms = 6 [default = 0];
    optional int64 audio_end_ms = 7 [default = 0];
    repeated WordInfoProto words = 8;
    // v6: per-block anchor metadata. anchor_line_index = -1 means "use start_line_index".
    optional int32 anchor_line_index = 9 [default = -1];
    optional AnchorTargetProto anchor_target = 10 [default = MAIN];
    optional AnchorModeProto anchor_mode = 11 [default = AUTO];
}

enum AnchorTargetProto {
    MAIN = 0;
    CUE = 1;
}

enum AnchorModeProto {
    AUTO = 0;
    MANUAL = 1;
}

message AudioRecordingProto {
    optional string audio_file = 1 [default = ""];
    optional int64 start_time_ms = 2 [default = 0];
    optional int64 duration_ms = 3 [default = 0];
}

message ColumnDataProto {
    repeated InkStrokeProto strokes = 1;
    map<int32, string> line_text_cache = 2;
    repeated int32 ever_hidden_lines = 3;
    repeated DiagramAreaProto diagram_areas = 4;
    repeated TextBlockProto text_blocks = 5;
}

message DocumentProto {
    optional ColumnDataProto main = 1;
    optional ColumnDataProto cue = 2;
    optional float scroll_offset_y = 3 [default = 0];
    optional int32 highest_line_index = 4 [default = 0];
    optional int32 current_line_index = 5 [default = 0];
    optional bool user_renamed = 6 [default = false];
    // 0 = legacy absolute pixels (no conversion on load)
    // 1 = normalized line-units (convert on load using device LINE_SPACING)
    optional int32 coordinate_system = 7 [default = 0];
    repeated AudioRecordingProto audio_recordings = 8;
    // v6: transcript column owns all audio-derived TextBlocks. Legacy documents
    // are migrated on load — see DocumentProtoMapper.
    optional ColumnDataProto transcript = 9;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <title>Current State: Split Layout</title>

  <!-- Background -->
  <rect width="400" height="600" fill="white" stroke="#333" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">CURRENT: Split Layout</text>

  <!-- Text Panel -->
  <rect x="10" y="38" width="380" height="150" fill="#F5F5F5" stroke="#999" stroke-width="1"/>
  <text x="20" y="58" font-family="serif" font-size="14" fill="#333">The quick brown fox jumps</text>
  <text x="20" y="78" font-family="serif" font-size="14" fill="#333">over the lazy dog. The</text>
  <text x="20" y="98" font-family="serif" font-size="14" fill="#333">weather today is quite</text>
  <text x="20" y="118" font-family="serif" font-size="14" fill="#333">pleasant and warm with</text>
  <text x="20" y="138" font-family="serif" font-size="14" fill="#555">a gentle breeze blowing</text>
  <text x="20" y="158" font-family="serif" font-size="14" fill="#999">from the south...</text>
  <text x="370" y="55" text-anchor="end" font-family="monospace" font-size="9" fill="#999">Recognized</text>
  <text x="370" y="65" text-anchor="end" font-family="monospace" font-size="9" fill="#999">Text Panel</text>

  <!-- Divider -->
  <rect x="10" y="188" width="380" height="4" fill="#CCC"/>
  <text x="200" y="196" text-anchor="middle" font-family="monospace" font-size="8" fill="#999">drag to resize</text>

  <!-- Canvas -->
  <rect x="10" y="192" width="380" height="398" fill="white" stroke="#999" stroke-width="1"/>

  <!-- Ruled lines -->
  <line x1="10" y1="230" x2="390" y2="230" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="275" x2="390" y2="275" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="320" x2="390" y2="320" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="365" x2="390" y2="365" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="410" x2="390" y2="410" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="455" x2="390" y2="455" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="500" x2="390" y2="500" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="545" x2="390" y2="545" stroke="#DDD" stroke-width="1"/>

  <!-- Handwritten strokes (wavy lines simulating handwriting) -->
  <path d="M30,220 Q50,215 70,222 Q90,228 110,218 Q130,210 155,220 Q175,228 195,215 Q210,208 235,220"
        stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M30,265 Q55,258 80,268 Q105,275 130,262 Q155,255 180,265 Q200,272 220,260 Q240,252 265,265 Q280,272 300,260"
        stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M30,310 Q60,302 90,312 Q115,320 140,308 Q160,300 185,312"
        stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Arrow showing disconnection -->
  <line x1="200" y1="170" x2="200" y2="210" stroke="#CC0000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="290" y="183" font-family="monospace" font-size="9" fill="#CC0000">disconnected!</text>

  <!-- Label -->
  <text x="370" y="215" text-anchor="end" font-family="monospace" font-size="9" fill="#999">Canvas</text>
</svg>

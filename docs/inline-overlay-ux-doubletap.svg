<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 380" width="400" height="380">
  <title>Double-Tap to Un-consolidate</title>

  <!-- Background -->
  <rect width="400" height="380" fill="white" stroke="#333" stroke-width="2"/>

  <!-- Title -->
  <text x="200" y="24" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#333">Double-Tap to Un-consolidate</text>

  <!-- ===== BEFORE: consolidated ===== -->
  <text x="200" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">BEFORE: Consolidated</text>

  <rect x="10" y="60" width="380" height="90" fill="white" stroke="#999" stroke-width="1"/>
  <line x1="10" y1="100" x2="390" y2="100" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="140" x2="390" y2="140" stroke="#DDD" stroke-width="1"/>

  <!-- Consolidated Hershey text -->
  <text x="25" y="90" font-family="cursive, 'Segoe Script', serif" font-size="16" fill="black" font-style="italic">the lazy dog. Today the weather</text>

  <!-- Double-tap indicator -->
  <circle cx="130" cy="88" r="10" fill="none" stroke="#2196F3" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="130" cy="88" r="5" fill="none" stroke="#2196F3" stroke-width="1"/>
  <text x="150" y="78" font-family="monospace" font-size="9" fill="#2196F3">double tap</text>

  <!-- Consolidated label -->
  <rect x="300" y="63" width="85" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="342" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#2E7D32">consolidated</text>

  <!-- ===== AFTER: un-consolidated ===== -->
  <text x="200" y="180" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">AFTER: Un-consolidated (original strokes restored)</text>

  <rect x="10" y="188" width="380" height="90" fill="white" stroke="#999" stroke-width="1"/>
  <line x1="10" y1="228" x2="390" y2="228" stroke="#DDD" stroke-width="1"/>
  <line x1="10" y1="268" x2="390" y2="268" stroke="#DDD" stroke-width="1"/>

  <!-- Recognized text label ABOVE the line -->
  <text x="25" y="218" font-family="monospace" font-size="10" fill="#888">"the lazy dog. Today the weather"</text>

  <!-- Original handwritten strokes visible again -->
  <path d="M25,245 Q55,238 80,248 Q105,255 130,242 Q155,235 180,245 Q200,252 220,240 Q240,232 265,245 Q280,252 300,240 Q318,232 335,245 Q350,252 365,242"
        stroke="black" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Un-consolidated label -->
  <rect x="290" y="192" width="95" height="16" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.5"/>
  <text x="337" y="203" text-anchor="middle" font-family="monospace" font-size="8" fill="#E65100">un-consolidated</text>

  <!-- Explanation -->
  <rect x="15" y="295" width="370" height="75" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="200" y="313" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#333">Un-consolidation behavior:</text>
  <text x="200" y="330" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Double-tap consolidated text to reveal original strokes.</text>
  <text x="200" y="345" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Re-consolidates when user moves to a different line.</text>
  <text x="200" y="360" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">Single tap shows alternatives popup instead.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Pen-lift pipeline — measured p50 / p95 across 20 runs</title>
  <text x="600.0" y="30" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Pen-lift pipeline → measured timing distribution</text>
  <text x="600.0" y="52" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">Same stages and brackets as pen-lift-timeline.svg. 20 runs on a Palma 2 Pro. Sub-labels report p50 and p95 in ms. Total budget = 50 ms.</text>
  <g font-size="11" text-anchor="middle">
    <text x="60" y="86">A. injectStroke</text>
    <text x="60" y="100" fill="#666">called</text>
    <text x="180" y="86">B. endStroke</text>
    <text x="180" y="100" fill="#666">entered</text>
    <text x="300" y="86">C. finishTextStroke</text>
    <text x="300" y="100" fill="#666">entered</text>
    <text x="440" y="86">D. scratch_check</text>
    <text x="440" y="100" fill="#666">returned</text>
    <text x="560" y="86">E. shape_snap</text>
    <text x="560" y="100" fill="#666">returned</text>
    <text x="680" y="86">F. classify</text>
    <text x="680" y="100" fill="#666">returned</text>
    <text x="800" y="86">G. observers</text>
    <text x="800" y="100" fill="#666">returned</text>
    <text x="900" y="86">H. endStroke</text>
    <text x="900" y="100" fill="#666">returned</text>
    <text x="1020" y="86">I. append_bitmap</text>
    <text x="1020" y="100" fill="#666">returned</text>
    <text x="1140" y="86">J. waitForIdleSync</text>
    <text x="1140" y="100" fill="#666">returned</text>
  </g>
  <g stroke="#333" stroke-width="1.5">
    <line x1="60" y1="130" x2="60" y2="152"/>
    <line x1="180" y1="130" x2="180" y2="152"/>
    <line x1="300" y1="130" x2="300" y2="152"/>
    <line x1="440" y1="130" x2="440" y2="152"/>
    <line x1="560" y1="130" x2="560" y2="152"/>
    <line x1="680" y1="130" x2="680" y2="152"/>
    <line x1="800" y1="130" x2="800" y2="152"/>
    <line x1="900" y1="130" x2="900" y2="152"/>
    <line x1="1020" y1="130" x2="1020" y2="152"/>
    <line x1="1140" y1="130" x2="1140" y2="152"/>
  </g>
  <line x1="20" y1="141" x2="1180" y2="141" stroke="#333" stroke-width="1"/>
  <g stroke="#c0392b" stroke-width="1.5" fill="none">
    <line x1="60" y1="190" x2="1140" y2="190"/>
    <line x1="60" y1="183" x2="60" y2="197"/>
    <line x1="1140" y1="183" x2="1140" y2="197"/>
  </g>
  <text x="600.0" y="208" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">total — p50=102 ms · p95=433 ms</text>
  <text x="600.0" y="222" text-anchor="middle" fill="#666" font-size="10">(budget = 50 ms; test fails when total ≥ 50 ms)</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="60" y1="285" x2="110" y2="285"/>
    <line x1="60" y1="278" x2="60" y2="292"/>
    <line x1="110" y1="278" x2="110" y2="292"/>
  </g>
  <text x="85.0" y="257" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">begin</text>
  <text x="85.0" y="271" text-anchor="middle" fill="#666" font-size="10">p50=0 ms · p95=0 ms</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="115" y1="285" x2="180" y2="285"/>
    <line x1="115" y1="278" x2="115" y2="292"/>
    <line x1="180" y1="278" x2="180" y2="292"/>
  </g>
  <text x="147.5" y="257" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">add_points</text>
  <text x="147.5" y="271" text-anchor="middle" fill="#666" font-size="10">p50=0 ms · p95=1 ms</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="180" y1="285" x2="900" y2="285"/>
    <line x1="180" y1="278" x2="180" y2="292"/>
    <line x1="900" y1="278" x2="900" y2="292"/>
  </g>
  <text x="540.0" y="303" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="700">end</text>
  <text x="540.0" y="317" text-anchor="middle" fill="#666" font-size="10">p50=69 ms · p95=145 ms</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="900" y1="285" x2="1020" y2="285"/>
    <line x1="900" y1="278" x2="900" y2="292"/>
    <line x1="1020" y1="278" x2="1020" y2="292"/>
  </g>
  <text x="960.0" y="303" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">append_bitmap</text>
  <text x="960.0" y="317" text-anchor="middle" fill="#666" font-size="10">p50=0 ms · p95=1 ms</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="300" y1="380" x2="440" y2="380"/>
    <line x1="300" y1="373" x2="300" y2="387"/>
    <line x1="440" y1="373" x2="440" y2="387"/>
  </g>
  <text x="370.0" y="398" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">scratch_check</text>
  <text x="370.0" y="412" text-anchor="middle" fill="#666" font-size="10">p50=31 ms · p95=95 ms</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="440" y1="380" x2="560" y2="380"/>
    <line x1="440" y1="373" x2="440" y2="387"/>
    <line x1="560" y1="373" x2="560" y2="387"/>
  </g>
  <text x="500.0" y="398" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">shape_snap</text>
  <text x="500.0" y="412" text-anchor="middle" fill="#666" font-size="10">p50=0 ms · p95=1 ms</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="560" y1="380" x2="680" y2="380"/>
    <line x1="560" y1="373" x2="560" y2="387"/>
    <line x1="680" y1="373" x2="680" y2="387"/>
  </g>
  <text x="620.0" y="398" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">classify</text>
  <text x="620.0" y="412" text-anchor="middle" fill="#666" font-size="10">p50=0 ms · p95=3 ms</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="680" y1="380" x2="800" y2="380"/>
    <line x1="680" y1="373" x2="680" y2="387"/>
    <line x1="800" y1="373" x2="800" y2="387"/>
  </g>
  <text x="740.0" y="398" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">observers</text>
  <text x="740.0" y="412" text-anchor="middle" fill="#666" font-size="10">p50=32 ms · p95=47 ms</text>
  <rect x="1020" y="455" width="120" height="22" fill="#000" fill-opacity="0.06"/>
  <g stroke="#e67e22" stroke-width="1.5" fill="none">
    <line x1="1020" y1="470" x2="1140" y2="470"/>
    <line x1="1020" y1="463" x2="1020" y2="477"/>
    <line x1="1140" y1="463" x2="1140" y2="477"/>
  </g>
  <text x="1080.0" y="488" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="400">drain</text>
  <text x="1080.0" y="502" text-anchor="middle" fill="#666" font-size="10">p50=33 ms · p95=293 ms</text>
  <rect x="40" y="565" width="1120" height="115" fill="#fff5f1" stroke="#f4caaa"/>
  <text x="55" y="587" font-size="13" font-weight="700" fill="#c0392b">Findings</text>
  <text x="55" y="609" font-size="12" fill="#333"><tspan font-weight="700">Where the time goes (p50 = 102 ms):</tspan> dominant cost is inside <tspan fill="#1e6dc6" font-weight="700">end</tspan> (69 ms p50), driven by <tspan fill="#3498db" font-weight="700">scratch_check</tspan> (31 ms) + <tspan fill="#3498db" font-weight="700">observers</tspan> (32 ms).</text>
  <text x="55" y="627" font-size="12" fill="#333"><tspan font-weight="700">Where variance arises (p50 → p95):</tspan> <tspan fill="#3498db" font-weight="700">scratch_check</tspan> swings 19–95 ms (5×) and <tspan fill="#e67e22" font-weight="700">drain</tspan> swings 22–293 ms (13×).</text>
  <text x="55" y="645" font-size="12" fill="#333"><tspan font-weight="700">Other stages:</tspan> begin · add_points · shape_snap · classify · append_bitmap each contribute ≤ 3 ms even at p95 — not where to spend optimization budget.</text>
  <text x="55" y="663" font-size="11" fill="#666" font-style="italic">Stage spacing is structural, not proportional. For absolute magnitudes use the p50 / p95 sub-labels.</text>
  <rect x="40" y="720" width="1120" height="95" fill="#f6f7f8" stroke="#ddd"/>
  <text x="55" y="742" font-size="12" fill="#333"><tspan font-weight="700" fill="#c0392b">Red</tspan> = primary metric (the budget the test enforces).</text>
  <text x="55" y="760" font-size="12" fill="#333"><tspan font-weight="700" fill="#1e6dc6">Blue</tspan> = the four spans wrapped in <tspan font-family="ui-monospace,Menlo,monospace">PerfCounters.time</tspan> directly inside <tspan font-family="ui-monospace,Menlo,monospace">injectStrokeForTest</tspan>.</text>
  <text x="55" y="778" font-size="12" fill="#333"><tspan font-weight="700" fill="#3498db">Light blue</tspan> = sub-metrics inside <tspan font-family="ui-monospace,Menlo,monospace">finishTextStroke</tspan>; their sum is bounded by <tspan font-family="ui-monospace,Menlo,monospace">end</tspan>. Bracket labels drop the <tspan font-family="ui-monospace,Menlo,monospace">ink.pen_lift.</tspan> prefix.</text>
  <text x="55" y="796" font-size="12" fill="#333"><tspan font-weight="700" fill="#e67e22">Orange</tspan> = drain (no PerfMetric — observers post async work that <tspan font-family="ui-monospace,Menlo,monospace">waitForIdleSync</tspan> blocks on; computed as <tspan font-family="ui-monospace,Menlo,monospace">total − sync</tspan>).</text>
</svg>

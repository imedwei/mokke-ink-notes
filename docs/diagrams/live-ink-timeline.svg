<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Live-ink phase timeline — inksdk metrics</title>
  <text x="550.0" y="32" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Live-ink phase — inksdk metric coverage</text>
  <text x="550.0" y="54" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">Stages from kernel pen-down to first inValidate. Greyed regions are not measurable from the JVM.</text>
  <g font-size="11" text-anchor="middle">
    <text x="80" y="105" fill="#888">L0. pen tip</text>
    <text x="80" y="119" fill="#888">touches glass</text>
    <text x="240" y="105">L1. kernel writes</text>
    <text x="240" y="119" fill="#666">/dev/input</text>
    <text x="400" y="105">L2. JVM receives</text>
    <text x="400" y="119" fill="#666">DOWN</text>
    <text x="580" y="105">L3. JVM receives</text>
    <text x="580" y="119" fill="#666">first MOVE</text>
    <text x="740" y="105">L4. drawLine</text>
    <text x="740" y="119" fill="#666">into ION</text>
    <text x="900" y="105">L5. inValidate</text>
    <text x="900" y="119" fill="#666">returns</text>
    <text x="1040" y="105" fill="#888">L6. EPD ink</text>
    <text x="1040" y="119" fill="#888">visible</text>
  </g>
  <g stroke="#333" stroke-width="1.5">
    <line x1="80" y1="145" x2="80" y2="165"/>
    <line x1="240" y1="145" x2="240" y2="165"/>
    <line x1="400" y1="145" x2="400" y2="165"/>
    <line x1="580" y1="145" x2="580" y2="165"/>
    <line x1="740" y1="145" x2="740" y2="165"/>
    <line x1="900" y1="145" x2="900" y2="165"/>
    <line x1="1040" y1="145" x2="1040" y2="165"/>
  </g>
  <line x1="20" y1="155" x2="1080" y2="155" stroke="#333" stroke-width="2"/>
  <rect x="20" y="148" width="220" height="14" fill="#000" fill-opacity="0.06"/>
  <rect x="900" y="148" width="180" height="14" fill="#000" fill-opacity="0.06"/>
  <g stroke="#c0392b" stroke-width="3" fill="none">
    <line x1="240" y1="210" x2="900" y2="210"/>
    <line x1="240" y1="203" x2="240" y2="217"/>
    <line x1="900" y1="203" x2="900" y2="217"/>
  </g>
  <text x="570.0" y="228" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">pen.kernel_to_paint</text>
  <text x="570.0" y="242" text-anchor="middle" fill="#666" font-size="10">(headline first-paint)</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="240" y1="290" x2="400" y2="290"/>
    <line x1="240" y1="283" x2="240" y2="297"/>
    <line x1="400" y1="283" x2="400" y2="297"/>
  </g>
  <text x="320.0" y="308" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">pen.kernel_to_jvm</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="400" y1="290" x2="900" y2="290"/>
    <line x1="400" y1="283" x2="400" y2="297"/>
    <line x1="900" y1="283" x2="900" y2="297"/>
  </g>
  <text x="650.0" y="308" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">pen.jvm_to_paint</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="400" y1="370" x2="580" y2="370"/>
    <line x1="400" y1="363" x2="400" y2="377"/>
    <line x1="580" y1="363" x2="580" y2="377"/>
  </g>
  <text x="490.0" y="388" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">pen.jvm_to_first_move</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="580" y1="370" x2="900" y2="370"/>
    <line x1="580" y1="363" x2="580" y2="377"/>
    <line x1="900" y1="363" x2="900" y2="377"/>
  </g>
  <text x="740.0" y="388" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">pen.move_to_paint</text>
  <g stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="6 3">
    <line x1="240" y1="440" x2="400" y2="440"/>
    <line x1="240" y1="433" x2="240" y2="447"/>
    <line x1="400" y1="433" x2="400" y2="447"/>
  </g>
  <text x="320.0" y="458" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="400">event.kernel_to_jvm</text>
  <text x="320.0" y="472" text-anchor="middle" fill="#666" font-size="10">(per event)</text>
  <g stroke="#27ae60" stroke-width="1.5" fill="none" stroke-dasharray="6 3">
    <line x1="400" y1="475" x2="440" y2="475"/>
    <line x1="400" y1="468" x2="400" y2="482"/>
    <line x1="440" y1="468" x2="440" y2="482"/>
  </g>
  <text x="446" y="478" fill="#27ae60" font-size="11" font-weight="400">event.handler  (per event)</text>
  <g stroke="#e67e22" stroke-width="1.5" fill="none">
    <line x1="740" y1="515" x2="770" y2="515"/>
    <line x1="740" y1="508" x2="740" y2="522"/>
    <line x1="770" y1="508" x2="770" y2="522"/>
  </g>
  <text x="755.0" y="487" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="400">paint.draw_segment</text>
  <g stroke="#e67e22" stroke-width="1.5" fill="none">
    <line x1="790" y1="515" x2="900" y2="515"/>
    <line x1="790" y1="508" x2="790" y2="522"/>
    <line x1="900" y1="508" x2="900" y2="522"/>
  </g>
  <text x="845.0" y="533" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="400">paint.invalidate_call</text>
  <rect x="40" y="555" width="1020" height="0" fill="none"/>
</svg>

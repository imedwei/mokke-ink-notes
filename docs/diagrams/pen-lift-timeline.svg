<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Pen-lift pipeline — host stages and metric coverage</title>
  <text x="490.0" y="28" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Pen-lift pipeline → ink committed, with metric coverage</text>
  <text x="490.0" y="50" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">Time flows left → right. Stage spacing is structural, not proportional. Greyed region is unmetered (computed as total − sync).</text>
  <g font-size="11" text-anchor="middle">
    <text x="60" y="102">A. test calls</text>
    <text x="60" y="116">injectStrokeForTest</text>
    <text x="160" y="94">B. addStrokePoint</text>
    <text x="160" y="108">loop done →</text>
    <text x="160" y="122">endStroke entered</text>
    <text x="260" y="102">C. finishStroke</text>
    <text x="260" y="116">→ finishTextStroke</text>
    <text x="390" y="102">D. scratch_check</text>
    <text x="390" y="116">returns</text>
    <text x="470" y="102">E. shape_snap</text>
    <text x="470" y="116">returns</text>
    <text x="550" y="102">F. classify</text>
    <text x="550" y="116">returns</text>
    <text x="640" y="94">G. observers</text>
    <text x="640" y="108">(onStrokeCompleted)</text>
    <text x="640" y="122">return</text>
    <text x="740" y="102">H. endStroke</text>
    <text x="740" y="116">returns</text>
    <text x="830" y="102">I. injectStroke</text>
    <text x="830" y="116">returns</text>
    <text x="920" y="102">J. waitForIdleSync</text>
    <text x="920" y="116">returns</text>
  </g>
  <g stroke="#333" stroke-width="1.5">
    <line x1="60" y1="152" x2="60" y2="172"/>
    <line x1="160" y1="152" x2="160" y2="172"/>
    <line x1="260" y1="152" x2="260" y2="172"/>
    <line x1="390" y1="152" x2="390" y2="172"/>
    <line x1="470" y1="152" x2="470" y2="172"/>
    <line x1="550" y1="152" x2="550" y2="172"/>
    <line x1="640" y1="152" x2="640" y2="172"/>
    <line x1="740" y1="152" x2="740" y2="172"/>
    <line x1="830" y1="152" x2="830" y2="172"/>
    <line x1="920" y1="152" x2="920" y2="172"/>
  </g>
  <line x1="20" y1="162" x2="960" y2="162" stroke="#333" stroke-width="1"/>
  <rect x="20"  y="155" width="40" height="14" fill="#000" fill-opacity="0.06"/>
  <g stroke="#c0392b" stroke-width="1.5" fill="none">
    <line x1="60" y1="208" x2="920" y2="208"/>
    <line x1="60" y1="201" x2="60" y2="215"/>
    <line x1="920" y1="201" x2="920" y2="215"/>
  </g>
  <text x="490.0" y="226" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">PEN_LIFT_BUDGET_MS — test asserts total &lt; 50 ms</text>
  <text x="490.0" y="240" text-anchor="middle" fill="#666" font-size="10">(SystemClock t0 → waitForIdleSync returns)</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="60" y1="270" x2="85" y2="270"/>
    <line x1="60" y1="263" x2="60" y2="277"/>
    <line x1="85" y1="263" x2="85" y2="277"/>
  </g>
  <text x="72.5" y="288" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">ink.pen_lift.begin</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="90" y1="270" x2="160" y2="270"/>
    <line x1="90" y1="263" x2="90" y2="277"/>
    <line x1="160" y1="263" x2="160" y2="277"/>
  </g>
  <text x="125.0" y="288" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">ink.pen_lift.add_points</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="160" y1="270" x2="740" y2="270"/>
    <line x1="160" y1="263" x2="160" y2="277"/>
    <line x1="740" y1="263" x2="740" y2="277"/>
  </g>
  <text x="450.0" y="288" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="700">ink.pen_lift.end</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="740" y1="270" x2="830" y2="270"/>
    <line x1="740" y1="263" x2="740" y2="277"/>
    <line x1="830" y1="263" x2="830" y2="277"/>
  </g>
  <text x="785.0" y="288" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">ink.pen_lift.append_bitmap</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="260" y1="340" x2="390" y2="340"/>
    <line x1="260" y1="333" x2="260" y2="347"/>
    <line x1="390" y1="333" x2="390" y2="347"/>
  </g>
  <text x="325.0" y="358" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">ink.pen_lift.scratch_check</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="390" y1="340" x2="470" y2="340"/>
    <line x1="390" y1="333" x2="390" y2="347"/>
    <line x1="470" y1="333" x2="470" y2="347"/>
  </g>
  <text x="430.0" y="358" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">ink.pen_lift.shape_snap</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="470" y1="340" x2="550" y2="340"/>
    <line x1="470" y1="333" x2="470" y2="347"/>
    <line x1="550" y1="333" x2="550" y2="347"/>
  </g>
  <text x="510.0" y="358" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">ink.pen_lift.classify</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="550" y1="340" x2="640" y2="340"/>
    <line x1="550" y1="333" x2="550" y2="347"/>
    <line x1="640" y1="333" x2="640" y2="347"/>
  </g>
  <text x="595.0" y="358" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">ink.pen_lift.observers</text>
  <text x="595.0" y="372" text-anchor="middle" fill="#666" font-size="10">(onStrokeCompleted)</text>
  <rect x="830" y="395" width="90" height="22" fill="#000" fill-opacity="0.06"/>
  <g stroke="#e67e22" stroke-width="1.5" fill="none">
    <line x1="830" y1="410" x2="920" y2="410"/>
    <line x1="830" y1="403" x2="830" y2="417"/>
    <line x1="920" y1="403" x2="920" y2="417"/>
  </g>
  <text x="875.0" y="428" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="400">drain</text>
  <text x="875.0" y="442" text-anchor="middle" fill="#666" font-size="10">(unmetered — observers' posted work draining)</text>
  <rect x="40" y="630" width="900" height="95" fill="#f6f7f8" stroke="#ddd"/>
  <text x="55" y="652" font-size="12" fill="#333"><tspan font-weight="700" fill="#c0392b">Red</tspan> = primary metric (the budget the test enforces).</text>
  <text x="55" y="670" font-size="12" fill="#333"><tspan font-weight="700" fill="#1e6dc6">Blue</tspan> = the four spans wrapped in <tspan font-family="ui-monospace,Menlo,monospace">PerfCounters.time</tspan> directly inside <tspan font-family="ui-monospace,Menlo,monospace">injectStrokeForTest</tspan>.</text>
  <text x="55" y="688" font-size="12" fill="#333"><tspan font-weight="700" fill="#3498db">Light blue</tspan> = sub-metrics inside <tspan font-family="ui-monospace,Menlo,monospace">finishTextStroke</tspan>; their sum is bounded by <tspan font-family="ui-monospace,Menlo,monospace">ink.pen_lift.end</tspan>.</text>
  <text x="55" y="706" font-size="12" fill="#333"><tspan font-weight="700" fill="#e67e22">Orange</tspan> = drain (no PerfMetric — observers post async work that <tspan font-family="ui-monospace,Menlo,monospace">waitForIdleSync</tspan> blocks on; computed as <tspan font-family="ui-monospace,Menlo,monospace">total − sync</tspan>).</text>
</svg>

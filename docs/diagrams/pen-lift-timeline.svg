<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Pen-lift phase timeline — mokke metrics</title>
  <text x="600.0" y="32" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Pen-lift phase — mokke metric coverage</text>
  <text x="600.0" y="54" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">Stages from injectStroke (= pen up) through waitForIdleSync (= queue empty). Stage spacing structural, not proportional.</text>
  <g font-size="11" text-anchor="middle">
    <text x="80" y="105">A. injectStroke</text>
    <text x="80" y="119" fill="#666">called (pen up)</text>
    <text x="200" y="195">B. endStroke</text>
    <text x="200" y="209" fill="#666">entered</text>
    <text x="320" y="105">C. finishTextStroke</text>
    <text x="320" y="119" fill="#666">entered</text>
    <text x="440" y="195">D. scratch_check</text>
    <text x="440" y="209" fill="#666">returned</text>
    <text x="560" y="105">E. shape_snap</text>
    <text x="560" y="119" fill="#666">returned</text>
    <text x="680" y="195">F. classify</text>
    <text x="680" y="209" fill="#666">returned</text>
    <text x="800" y="105">G. observers</text>
    <text x="800" y="119" fill="#666">returned</text>
    <text x="920" y="195">H. endStroke</text>
    <text x="920" y="209" fill="#666">returned</text>
    <text x="1020" y="105">I. append_bitmap</text>
    <text x="1020" y="119" fill="#666">returned</text>
    <text x="1140" y="195">J. waitForIdleSync</text>
    <text x="1140" y="209" fill="#666">returned</text>
  </g>
  <g stroke="#333" stroke-width="1.5">
    <line x1="80" y1="145" x2="80" y2="175"/>
    <line x1="200" y1="145" x2="200" y2="175"/>
    <line x1="320" y1="145" x2="320" y2="175"/>
    <line x1="440" y1="145" x2="440" y2="175"/>
    <line x1="560" y1="145" x2="560" y2="175"/>
    <line x1="680" y1="145" x2="680" y2="175"/>
    <line x1="800" y1="145" x2="800" y2="175"/>
    <line x1="920" y1="145" x2="920" y2="175"/>
    <line x1="1020" y1="145" x2="1020" y2="175"/>
    <line x1="1140" y1="145" x2="1140" y2="175"/>
  </g>
  <line x1="20" y1="160" x2="1180" y2="160" stroke="#333" stroke-width="2"/>
  <g stroke="#c0392b" stroke-width="3" fill="none">
    <line x1="80" y1="245" x2="1140" y2="245"/>
    <line x1="80" y1="238" x2="80" y2="252"/>
    <line x1="1140" y1="238" x2="1140" y2="252"/>
  </g>
  <text x="610.0" y="263" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">PEN_LIFT_BUDGET — total</text>
  <text x="610.0" y="277" text-anchor="middle" fill="#666" font-size="10">(test asserts &lt; 50 ms)</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="80" y1="325" x2="110" y2="325"/>
    <line x1="80" y1="318" x2="80" y2="332"/>
    <line x1="110" y1="318" x2="110" y2="332"/>
  </g>
  <text x="95.0" y="297" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">begin</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="115" y1="325" x2="200" y2="325"/>
    <line x1="115" y1="318" x2="115" y2="332"/>
    <line x1="200" y1="318" x2="200" y2="332"/>
  </g>
  <text x="157.5" y="297" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">add_points</text>
  <g stroke="#1e6dc6" stroke-width="3" fill="none">
    <line x1="200" y1="325" x2="920" y2="325"/>
    <line x1="200" y1="318" x2="200" y2="332"/>
    <line x1="920" y1="318" x2="920" y2="332"/>
  </g>
  <text x="560.0" y="343" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="700">end</text>
  <g stroke="#1e6dc6" stroke-width="1.5" fill="none">
    <line x1="920" y1="325" x2="1020" y2="325"/>
    <line x1="920" y1="318" x2="920" y2="332"/>
    <line x1="1020" y1="318" x2="1020" y2="332"/>
  </g>
  <text x="970.0" y="343" text-anchor="middle" fill="#1e6dc6" font-size="12" font-weight="400">append_bitmap</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="320" y1="410" x2="440" y2="410"/>
    <line x1="320" y1="403" x2="320" y2="417"/>
    <line x1="440" y1="403" x2="440" y2="417"/>
  </g>
  <text x="380.0" y="428" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">scratch_check</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="440" y1="410" x2="560" y2="410"/>
    <line x1="440" y1="403" x2="440" y2="417"/>
    <line x1="560" y1="403" x2="560" y2="417"/>
  </g>
  <text x="500.0" y="428" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">shape_snap</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="560" y1="410" x2="680" y2="410"/>
    <line x1="560" y1="403" x2="560" y2="417"/>
    <line x1="680" y1="403" x2="680" y2="417"/>
  </g>
  <text x="620.0" y="428" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">classify</text>
  <g stroke="#3498db" stroke-width="1.5" fill="none">
    <line x1="680" y1="410" x2="800" y2="410"/>
    <line x1="680" y1="403" x2="680" y2="417"/>
    <line x1="800" y1="403" x2="800" y2="417"/>
  </g>
  <text x="740.0" y="428" text-anchor="middle" fill="#3498db" font-size="12" font-weight="400">observers</text>
  <text x="740.0" y="442" text-anchor="middle" fill="#666" font-size="10">(onStrokeCompleted)</text>
  <rect x="1020" y="490" width="120" height="12" fill="#000" fill-opacity="0.06"/>
  <g stroke="#e67e22" stroke-width="1.5" fill="none">
    <line x1="1020" y1="495" x2="1140" y2="495"/>
    <line x1="1020" y1="488" x2="1020" y2="502"/>
    <line x1="1140" y1="488" x2="1140" y2="502"/>
  </g>
  <text x="1080.0" y="513" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="400">drain</text>
  <text x="1080.0" y="527" text-anchor="middle" fill="#666" font-size="10">(unmetered — observers' posted work)</text>
  <text x="600.0" y="555" text-anchor="middle" font-size="11" fill="#666" font-style="italic">All bracket labels drop the ink.pen_lift. prefix; full metric IDs are e.g. ink.pen_lift.scratch_check.</text>
</svg>

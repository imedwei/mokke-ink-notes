  <text x="420.00" y="886" text-anchor="middle" fill="#666" font-size="10">150</text>
  <line x1="540.00" y1="867" x2="540.00" y2="873" stroke="#666" stroke-width="1"/>
  <text x="540.00" y="886" text-anchor="middle" fill="#666" font-size="10">200</text>
  <line x1="660.00" y1="867" x2="660.00" y2="873" stroke="#666" stroke-width="1"/>
  <text x="660.00" y="886" text-anchor="middle" fill="#666" font-size="10">250</text>
  <line x1="780.00" y1="867" x2="780.00" y2="873" stroke="#666" stroke-width="1"/>
  <text x="780.00" y="886" text-anchor="middle" fill="#666" font-size="10">300</text>

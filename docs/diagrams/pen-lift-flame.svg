  <rect x="60.00" y="536" width="165.60" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="142.80" y="555.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">injectStroke 69 ms</text>
  <rect x="60.00" y="568" width="165.60" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="142.80" y="587.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">end 69 ms</text>
  <rect x="60.00" y="600" width="74.40" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="97.20" y="619.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">31</text>
  <rect x="134.40" y="600" width="76.80" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="172.80" y="619.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">observers</text>
  <rect x="211.20" y="600" width="14.40" height="30" fill="#ccc" stroke="white" stroke-width="1"/>
  <text x="218.40" y="619.00" text-anchor="middle" font-size="11" fill="#555" font-weight="700">6</text>
  <rect x="225.60" y="536" width="79.20" height="30" fill="#e67e22" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="265.20" y="555.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">drain 33 ms</text>
  <text x="60" y="704" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">p95 (worst 1 in 20) — user-observable latency</text>
  <g stroke="#7d3c98" stroke-width="1.5" fill="none">
    <line x1="60" y1="684" x2="1099.20" y2="684"/>
    <line x1="60" y1="679" x2="60" y2="689"/>
    <line x1="1099.20" y1="679" x2="1099.20" y2="689"/>
  </g>
  <rect x="60.00" y="712" width="1039.20" height="30" fill="#c0392b" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="579.60" y="731.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">total 433 ms</text>
  <rect x="60.00" y="744" width="352.80" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="236.40" y="763.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">injectStroke 147 ms</text>
  <rect x="60.00" y="776" width="2.40" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="62.40" y="776" width="348.00" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="236.40" y="795.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">end 145 ms</text>
  <rect x="62.40" y="808" width="228.00" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="176.40" y="827.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">scratch_check 95 ms</text>
  <rect x="290.40" y="808" width="2.40" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="292.80" y="808" width="7.20" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="300.00" y="808" width="112.80" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="356.40" y="827.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">observers 47 ms</text>

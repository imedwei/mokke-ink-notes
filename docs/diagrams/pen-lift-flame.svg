<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 930" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Pen-lift flame graph — p50 vs p95</title>
  <text x="700.0" y="32" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Pen-lift flame graph — p50 vs p95</text>
  <text x="700.0" y="54" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">Palma 2 Pro · 20 runs · widths proportional to ms · same horizontal scale on both flames.</text>
  <line x1="202.22" y1="84" x2="202.22" y2="533" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="208.22" y="78" fill="#c0392b" font-size="11" font-weight="700">budget = 50 ms</text>
  <text x="60" y="100" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">p50 (typical run)</text>
  <g stroke="#7d3c98" stroke-width="1.5" fill="none">
    <line x1="60" y1="128" x2="350.13" y2="128"/>
    <line x1="60" y1="123" x2="60" y2="133"/>
    <line x1="350.13" y1="123" x2="350.13" y2="133"/>
  </g>
  <text x="205.07" y="120" text-anchor="middle" fill="#7d3c98" font-size="10" font-weight="700">user-observable</text>
  <rect x="60.00" y="148" width="290.13" height="32" fill="#c0392b" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="205.07" y="168.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">total 102 ms</text>
  <rect x="60.00" y="182" width="196.27" height="32" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="158.13" y="202.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">injectStroke 69 ms</text>
  <rect x="60.00" y="216" width="196.27" height="32" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="158.13" y="236.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">end 69 ms</text>
  <rect x="60.00" y="250" width="88.18" height="32" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="104.09" y="270.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">31 ms</text>
  <rect x="148.18" y="250" width="91.02" height="32" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="193.69" y="270.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">observers</text>
  <rect x="239.20" y="250" width="17.07" height="32" fill="#ccc" stroke="white" stroke-width="1"/>
  <rect x="256.27" y="182" width="93.87" height="32" fill="#e67e22" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="303.20" y="202.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">drain 33 ms</text>
  <line x1="247.73" y1="282" x2="247.73" y2="300" stroke="#888" stroke-width="1"/>
  <text x="247.73" y="310" text-anchor="middle" font-size="10" fill="#888">overhead 6 ms</text>
  <text x="60" y="344" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">p95 (worst 1 in 20)</text>
  <g stroke="#7d3c98" stroke-width="1.5" fill="none">
    <line x1="60" y1="372" x2="1291.64" y2="372"/>
    <line x1="60" y1="367" x2="60" y2="377"/>
    <line x1="1291.64" y1="367" x2="1291.64" y2="377"/>
  </g>
  <text x="675.82" y="364" text-anchor="middle" fill="#7d3c98" font-size="10" font-weight="700">user-observable</text>
  <rect x="60.00" y="392" width="1231.64" height="32" fill="#c0392b" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="675.82" y="412.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">total 433 ms</text>
  <rect x="60.00" y="426" width="418.13" height="32" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="269.07" y="446.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">injectStroke 147 ms</text>
  <rect x="60.00" y="460" width="2.84" height="32" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="62.84" y="460" width="412.44" height="32" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="269.07" y="480.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">end 145 ms</text>
  <rect x="62.84" y="494" width="270.22" height="32" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="197.96" y="514.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">scratch_check 95 ms</text>
  <rect x="333.07" y="494" width="2.84" height="32" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="335.91" y="494" width="8.53" height="32" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="344.44" y="494" width="133.69" height="32" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="411.29" y="514.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">observers 47 ms</text>
  <rect x="475.29" y="460" width="2.84" height="32" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="478.13" y="426" width="833.42" height="32" fill="#e67e22" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="894.84" y="446.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">drain 293 ms</text>
  <line x1="61.42" y1="492" x2="61.42" y2="544" stroke="#1e6dc6" stroke-width="1"/>
  <text x="61.42" y="554" text-anchor="middle" font-size="10" fill="#1e6dc6">add_points 1 ms</text>
  <line x1="334.49" y1="526" x2="334.49" y2="544" stroke="#3498db" stroke-width="1"/>
  <text x="334.49" y="554" text-anchor="middle" font-size="10" fill="#3498db">shape_snap 1 ms</text>
  <line x1="340.18" y1="526" x2="340.18" y2="544" stroke="#3498db" stroke-width="1"/>
  <text x="340.18" y="554" text-anchor="middle" font-size="10" fill="#3498db">classify 3 ms</text>
  <line x1="476.71" y1="492" x2="476.71" y2="544" stroke="#1e6dc6" stroke-width="1"/>
  <text x="476.71" y="554" text-anchor="middle" font-size="10" fill="#1e6dc6">append_bitmap 1 ms</text>
  <line x1="60" y1="560" x2="1340.00" y2="560" stroke="#aaa" stroke-width="1"/>
  <line x1="60.00" y1="557" x2="60.00" y2="563" stroke="#666" stroke-width="1"/>
  <text x="60.00" y="576" text-anchor="middle" fill="#666" font-size="10">0</text>
  <line x1="202.22" y1="557" x2="202.22" y2="563" stroke="#666" stroke-width="1"/>
  <text x="202.22" y="576" text-anchor="middle" fill="#666" font-size="10">50</text>
  <line x1="344.44" y1="557" x2="344.44" y2="563" stroke="#666" stroke-width="1"/>
  <text x="344.44" y="576" text-anchor="middle" fill="#666" font-size="10">100</text>
  <line x1="486.67" y1="557" x2="486.67" y2="563" stroke="#666" stroke-width="1"/>
  <text x="486.67" y="576" text-anchor="middle" fill="#666" font-size="10">150</text>
  <line x1="628.89" y1="557" x2="628.89" y2="563" stroke="#666" stroke-width="1"/>
  <text x="628.89" y="576" text-anchor="middle" fill="#666" font-size="10">200</text>
  <line x1="771.11" y1="557" x2="771.11" y2="563" stroke="#666" stroke-width="1"/>
  <text x="771.11" y="576" text-anchor="middle" fill="#666" font-size="10">250</text>
  <line x1="913.33" y1="557" x2="913.33" y2="563" stroke="#666" stroke-width="1"/>
  <text x="913.33" y="576" text-anchor="middle" fill="#666" font-size="10">300</text>
  <line x1="1055.56" y1="557" x2="1055.56" y2="563" stroke="#666" stroke-width="1"/>
  <text x="1055.56" y="576" text-anchor="middle" fill="#666" font-size="10">350</text>
  <line x1="1197.78" y1="557" x2="1197.78" y2="563" stroke="#666" stroke-width="1"/>
  <text x="1197.78" y="576" text-anchor="middle" fill="#666" font-size="10">400</text>
  <line x1="1340.00" y1="557" x2="1340.00" y2="563" stroke="#666" stroke-width="1"/>
  <text x="1340.00" y="576" text-anchor="middle" fill="#666" font-size="10">450</text>
  <text x="1348.00" y="564.00" fill="#666" font-size="10">ms</text>
  <rect x="40" y="596" width="1320" height="220" fill="#fff5f1" stroke="#f4caaa"/>
  <text x="55" y="618" font-size="13" font-weight="700" fill="#c0392b">What the flame shows</text>
  <text x="55" y="644" font-size="12" fill="#333"><tspan font-weight="700" fill="#7d3c98">User-observable bracket</tspan> spans the entire root: every ms on the main thread between pen-up</text>
  <text x="55" y="662" font-size="12" fill="#333">and queue-empty is felt by the user. Blue (sync) blocks because of in-flight CPU; orange (drain)</text>
  <text x="55" y="680" font-size="12" fill="#333">blocks because observers have queued work that delays the next input event.</text>
  <text x="55" y="704" font-size="12" fill="#333"><tspan font-weight="700">p50 → p95 amplification</tspan> at the root: 102 → 433 ms (4.2× wider in the worst 1-in-20 run).</text>
  <text x="55" y="722" font-size="12" fill="#333"><tspan font-weight="700">scratch_check</tspan> (31 → 95 ms) and <tspan font-weight="700">drain</tspan> (33 → 293 ms) are where the box doubles or triples;</text>
  <text x="55" y="740" font-size="12" fill="#333">other stages stay in the single digits.</text>
  <text x="55" y="764" font-size="11" fill="#666" font-style="italic">Frames too narrow for an inline label use a leader line to a callout below the flame. Live-ink metrics</text>
  <text x="55" y="782" font-size="11" fill="#666" font-style="italic">are not in this flame — see live-ink-timeline.svg for their structural coverage.</text>
  <rect x="40" y="830" width="1320" height="80" fill="#f6f7f8" stroke="#ddd"/>
  <text x="55" y="852" font-size="13" font-weight="700" fill="#333">Legend</text>
  <text x="55" y="872" font-size="11" fill="#333"><tspan font-weight="700" fill="#c0392b">Red</tspan> = root (total). <tspan font-weight="700" fill="#1e6dc6">Blue</tspan> = pen-lift sync metrics. <tspan font-weight="700" fill="#3498db">Light blue</tspan> = nested sub-metrics inside <tspan font-family="ui-monospace,Menlo,monospace">end</tspan>.</text>
  <text x="55" y="890" font-size="11" fill="#333"><tspan font-weight="700" fill="#e67e22">Orange</tspan> = drain. <tspan font-weight="700" fill="#7d3c98">Violet</tspan> = user-observable bracket. <tspan font-weight="700" fill="#888">Grey</tspan> = unmetered overhead inside <tspan font-family="ui-monospace,Menlo,monospace">end</tspan>.</text>
</svg>

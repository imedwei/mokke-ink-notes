<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1260" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Pen-lift flame graph + live-ink timeline</title>
  <text x="600.0" y="32" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Pen-lift flame graph + live-ink metric timeline</text>
  <text x="600.0" y="54" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">Top: structural live-ink timeline (inksdk metrics, no scale). Bottom: measured pen-lift flame (20 runs on Palma 2 Pro).</text>

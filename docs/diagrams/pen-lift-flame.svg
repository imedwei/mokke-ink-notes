<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 794" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
  <title>Pen-lift flame graph (p50 vs p95)</title>
  <text x="600.0" y="32" text-anchor="middle" font-size="18" font-weight="700" font-family="system-ui, Helvetica, sans-serif">Pen-lift flame graph — p50 vs p95</text>
  <text x="600.0" y="54" text-anchor="middle" font-size="12" fill="#666" font-family="system-ui, Helvetica, sans-serif">20 runs on Palma 2 Pro · same horizontal scale on both flames · widths proportional to ms · "overhead" = end-time not covered by sub-metrics.</text>
  <rect x="40" y="78" width="400" height="50" rx="6" ry="6" fill="#eaf3fc" stroke="#1e6dc6" stroke-width="1.5"/>
  <text x="240.0" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#1e6dc6">Live-ink phase (during stroke)</text>
  <text x="240.0" y="116" text-anchor="middle" font-size="10" fill="#444">inksdk metrics: pen.kernel_to_paint · event.handler · paint.draw_segment</text>
  <rect x="460" y="78" width="400" height="50" rx="6" ry="6" fill="#fef0ec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="660.0" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#c0392b">Pen-lift phase  ← this flame</text>
  <text x="660.0" y="116" text-anchor="middle" font-size="10" fill="#444">host post-stroke pipeline → ink committed → next interaction ready</text>
  <rect x="880" y="78" width="280" height="50" rx="6" ry="6" fill="#f6f7f8" stroke="#999" stroke-width="1.5"/>
  <text x="1020.0" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#999">Idle</text>
  <text x="1020.0" y="116" text-anchor="middle" font-size="10" fill="#444">ready for next pen-down</text>
  <path d="M 440 103 l 18 0 m -6 -5 l 6 5 -6 5" stroke="#666" stroke-width="1.5" fill="none"/>
  <path d="M 860 103 l 18 0 m -6 -5 l 6 5 -6 5" stroke="#666" stroke-width="1.5" fill="none"/>
  <line x1="180.00" y1="170" x2="180.00" y2="529" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="186.00" y="184" fill="#c0392b" font-size="11" font-weight="700">budget = 50 ms</text>
  <text x="60" y="180" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">p50 (typical run) — user-observable latency</text>
  <g stroke="#7d3c98" stroke-width="1.5" fill="none">
    <line x1="60" y1="160" x2="304.80" y2="160"/>
    <line x1="60" y1="155" x2="60" y2="165"/>
    <line x1="304.80" y1="155" x2="304.80" y2="165"/>
  </g>
  <rect x="60.00" y="188" width="244.80" height="30" fill="#c0392b" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="182.40" y="207.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">total 102 ms</text>
  <rect x="60.00" y="220" width="165.60" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="142.80" y="239.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">injectStroke 69 ms</text>
  <rect x="60.00" y="252" width="165.60" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="142.80" y="271.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">end 69 ms</text>
  <rect x="60.00" y="284" width="74.40" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="97.20" y="303.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">31</text>
  <rect x="134.40" y="284" width="76.80" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="172.80" y="303.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">observers</text>
  <rect x="211.20" y="284" width="14.40" height="30" fill="#ccc" stroke="white" stroke-width="1"/>
  <text x="218.40" y="303.00" text-anchor="middle" font-size="11" fill="#555" font-weight="700">6</text>
  <rect x="225.60" y="220" width="79.20" height="30" fill="#e67e22" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="265.20" y="239.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">drain 33 ms</text>
  <text x="60" y="388" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">p95 (worst 1 in 20) — user-observable latency</text>
  <g stroke="#7d3c98" stroke-width="1.5" fill="none">
    <line x1="60" y1="368" x2="1099.20" y2="368"/>
    <line x1="60" y1="363" x2="60" y2="373"/>
    <line x1="1099.20" y1="363" x2="1099.20" y2="373"/>
  </g>
  <rect x="60.00" y="396" width="1039.20" height="30" fill="#c0392b" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="579.60" y="415.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">total 433 ms</text>
  <rect x="60.00" y="428" width="352.80" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="236.40" y="447.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">injectStroke 147 ms</text>
  <rect x="60.00" y="460" width="2.40" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="62.40" y="460" width="348.00" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="236.40" y="479.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">end 145 ms</text>
  <rect x="62.40" y="492" width="228.00" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="176.40" y="511.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">scratch_check 95 ms</text>
  <rect x="290.40" y="492" width="2.40" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="292.80" y="492" width="7.20" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="300.00" y="492" width="112.80" height="30" fill="#3498db" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="356.40" y="511.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">observers 47 ms</text>
  <rect x="410.40" y="460" width="2.40" height="30" fill="#1e6dc6" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <rect x="412.80" y="428" width="703.20" height="30" fill="#e67e22" fill-opacity="0.85" stroke="white" stroke-width="1"/>
  <text x="764.40" y="447.00" text-anchor="middle" font-size="11" fill="white" font-weight="700">drain 293 ms</text>
  <line x1="60" y1="554" x2="1140.00" y2="554" stroke="#aaa" stroke-width="1"/>
  <line x1="60.00" y1="551" x2="60.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="60.00" y="570" text-anchor="middle" fill="#666" font-size="10">0</text>
  <line x1="180.00" y1="551" x2="180.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="180.00" y="570" text-anchor="middle" fill="#666" font-size="10">50</text>
  <line x1="300.00" y1="551" x2="300.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="300.00" y="570" text-anchor="middle" fill="#666" font-size="10">100</text>
  <line x1="420.00" y1="551" x2="420.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="420.00" y="570" text-anchor="middle" fill="#666" font-size="10">150</text>
  <line x1="540.00" y1="551" x2="540.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="540.00" y="570" text-anchor="middle" fill="#666" font-size="10">200</text>
  <line x1="660.00" y1="551" x2="660.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="660.00" y="570" text-anchor="middle" fill="#666" font-size="10">250</text>
  <line x1="780.00" y1="551" x2="780.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="780.00" y="570" text-anchor="middle" fill="#666" font-size="10">300</text>
  <line x1="900.00" y1="551" x2="900.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="900.00" y="570" text-anchor="middle" fill="#666" font-size="10">350</text>
  <line x1="1020.00" y1="551" x2="1020.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="1020.00" y="570" text-anchor="middle" fill="#666" font-size="10">400</text>
  <line x1="1140.00" y1="551" x2="1140.00" y2="557" stroke="#666" stroke-width="1"/>
  <text x="1140.00" y="570" text-anchor="middle" fill="#666" font-size="10">450</text>
  <text x="1148.00" y="558.00" fill="#666" font-size="10">ms</text>
  <rect x="40" y="589" width="1120" height="135" fill="#fff5f1" stroke="#f4caaa"/>
  <text x="55" y="611" font-size="13" font-weight="700" fill="#c0392b">What the flame shows</text>
  <text x="55" y="633" font-size="12" fill="#333"><tspan font-weight="700" fill="#7d3c98">User-observable bracket</tspan> spans the entire root: every millisecond on the main thread between pen-up and queue-empty is felt by the user. The blue (sync) section blocks because of in-flight CPU; the orange (drain) section blocks because observers have queued work that delays the next input event.</text>
  <text x="55" y="655" font-size="12" fill="#333"><tspan font-weight="700">p50 → p95 amplification</tspan> at the root: 102 → 433 ms (4.2× wider in the worst 1-in-20 run).</text>
  <text x="55" y="673" font-size="12" fill="#333"><tspan font-weight="700">scratch_check</tspan> (31 → 95 ms) and <tspan font-weight="700">drain</tspan> (33 → 293 ms) are where the box doubles or triples. Other stages stay in the single digits.</text>
  <text x="55" y="691" font-size="12" fill="#333"><tspan font-weight="700">inksdk metrics are NOT in this flame</tspan> — they fire during the live-ink phase (left of the banner above), not during pen-lift. The flame above is purely host-side post-stroke work.</text>
  <text x="55" y="709" font-size="11" fill="#666" font-style="italic">Children inside a parent are sized to fit. At p95, percentiles aren't additive across stages, so the visual layout is normalized.</text>
</svg>

  <line x1="40" y1="436" x2="1160" y2="436" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="600.0" y="454" text-anchor="middle" font-size="11" font-weight="700" fill="#7d3c98">↓  pen lifts off the glass — pen-lift pipeline begins  ↓</text>
  <text x="60" y="492" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">Measured pen-lift flame (Palma 2 Pro, 20 runs)</text>
  <line x1="180.00" y1="486" x2="180.00" y2="845" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="186.00" y="500" fill="#c0392b" font-size="11" font-weight="700">budget = 50 ms</text>
  <text x="60" y="496" font-size="13" font-weight="700" fill="#333" font-family="system-ui, Helvetica, sans-serif">p50 (typical run) — user-observable latency</text>

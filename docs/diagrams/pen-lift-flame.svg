  <line x1="1140.00" y1="867" x2="1140.00" y2="873" stroke="#666" stroke-width="1"/>
  <text x="1140.00" y="886" text-anchor="middle" fill="#666" font-size="10">450</text>
  <text x="1148.00" y="874.00" fill="#666" font-size="10">ms</text>
  <rect x="40" y="905" width="1120" height="220" fill="#fff5f1" stroke="#f4caaa"/>
  <text x="55" y="927" font-size="13" font-weight="700" fill="#c0392b">What the flame shows</text>
  <text x="55" y="953" font-size="12" fill="#333"><tspan font-weight="700" fill="#7d3c98">User-observable bracket</tspan> spans the entire root: every ms on the main thread between pen-up</text>
  <text x="55" y="971" font-size="12" fill="#333">and queue-empty is felt by the user. Blue (sync) blocks because of in-flight CPU; orange (drain)</text>
  <text x="55" y="989" font-size="12" fill="#333">blocks because observers have queued work that delays the next input event.</text>
  <text x="55" y="1013" font-size="12" fill="#333"><tspan font-weight="700">p50 → p95 amplification</tspan> at the root: 102 → 433 ms (4.2× wider in the worst 1-in-20 run).</text>
  <text x="55" y="1031" font-size="12" fill="#333"><tspan font-weight="700">scratch_check</tspan> (31 → 95 ms) and <tspan font-weight="700">drain</tspan> (33 → 293 ms) are where the box doubles or triples;</text>
  <text x="55" y="1049" font-size="12" fill="#333">other stages stay in the single digits.</text>
  <text x="55" y="1073" font-size="12" fill="#333"><tspan font-weight="700">inksdk metrics</tspan> are in the structural panel above — they fire during the live-ink phase</text>
  <text x="55" y="1091" font-size="12" fill="#333">(<tspan font-family="ui-monospace,Menlo,monospace">pen.kernel_to_paint</tspan>, <tspan font-family="ui-monospace,Menlo,monospace">paint.draw_segment</tspan>, etc.). They are independent of pen-lift.</text>
  <rect x="40" y="1140" width="1120" height="100" fill="#f6f7f8" stroke="#ddd"/>
  <text x="55" y="1162" font-size="13" font-weight="700" fill="#333">Legend</text>
  <text x="55" y="1182" font-size="11" fill="#333"><tspan font-weight="700" fill="#c0392b">Red</tspan> = primary metric. <tspan font-weight="700" fill="#1e6dc6">Blue</tspan> = pen.* (per stroke). <tspan font-weight="700" fill="#3498db">Light blue</tspan> = nested pen.* / pen-lift sub-metrics.</text>
  <text x="55" y="1200" font-size="11" fill="#333"><tspan font-weight="700" fill="#27ae60">Green dashed</tspan> = event.* (per event). <tspan font-weight="700" fill="#e67e22">Orange</tspan> = paint.* and pen-lift drain. <tspan font-weight="700" fill="#7d3c98">Violet</tspan> = user-observable bracket.</text>
  <text x="55" y="1218" font-size="11" fill="#666">Greyed segments in the live-ink panel are unmeasurable from the JVM (kernel land, EPD refresh).</text>
</svg>
